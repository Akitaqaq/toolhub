<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔧%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolHub - 多功能工具集合网站</title>
    <meta name="description" content="ToolHub - 一站式在线工具集合，包含JSON格式化、时间戳转换、编码解码等实用工具" />
    <!-- 立即应用主题，防止闪烁 -->
    <style>
      body { margin: 0; font-family: system-ui; padding: 20px; }
      #root { min-height: 100vh; }
      .loading { text-align: center; padding: 60px 20px; opacity: 0.6; }
      /* Default light theme base */
      :root { background: #ffffff; color: #0a0a0a; }
      [data-theme="dark"] { background: #0f172a; color: #f8fafc; }
    </style>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('toolhub-color-mode')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var theme = saved || (prefersDark ? 'dark' : 'light')
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"><div class="loading">正在加载 ToolHub...</div></div>
    <!-- 基础脚本引用，Vite会自动替换为构建后的正确路径 -->
    <script type="module" crossorigin src="./src/main.tsx"></script>
  </body>
</html>
